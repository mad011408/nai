version: '3.8'

services:
  ai-agent:
    build: .
    container_name: advanced-ai-agent
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - ai-network

  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - ai-network

  mongodb:
    image: mongo:7
    container_name: ai-agent-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=advanced-ai-agent
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  redis-data:
  mongodb-data:
